<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1115"/>
      <stop offset="40%" stop-color="#3b0764"/>
      <stop offset="100%" stop-color="#831843"/>
    </linearGradient>
    <linearGradient id="cta2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="50%" stop-color="#d946ef"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="glow2" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .h1 { font-family: 'Inter', system-ui, sans-serif; font-weight: 900; }
      .h2 { font-family: 'Inter', system-ui, sans-serif; font-weight: 700; }
      .body { font-family: 'Inter', system-ui, sans-serif; font-weight: 500; }
      .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; font-weight: 600; }
    </style>
  </defs>

  <rect width="1080" height="1920" fill="url(#bg2)"/>

  <!-- Decorative stars -->
  <circle cx="120" cy="220" r="5" fill="#f59e0b" opacity="0.7"/>
  <circle cx="960" cy="380" r="6" fill="#06b6d4" opacity="0.6"/>
  <circle cx="200" cy="1620" r="6" fill="#ec4899" opacity="0.7"/>
  <circle cx="900" cy="1750" r="5" fill="#10b981" opacity="0.6"/>
  <circle cx="540" cy="120" r="4" fill="#ffffff" opacity="0.5"/>
  <circle cx="80"  cy="900" r="3" fill="#ffffff" opacity="0.4"/>
  <circle cx="1000" cy="1100" r="4" fill="#ffffff" opacity="0.4"/>

  <!-- Logo -->
  <g transform="translate(540, 240)">
    <rect x="-54" y="-54" width="108" height="108" rx="26" fill="url(#cta2)"/>
    <text x="0" y="22" text-anchor="middle" class="h1" font-size="78" fill="#ffffff">◆</text>
  </g>
  <text x="540" y="420" text-anchor="middle" class="h1" font-size="118" fill="#ffffff">PostManager</text>
  <text x="540" y="478" text-anchor="middle" class="body" font-size="34" fill="#ffffff" opacity="0.75">
    AI'lı sosyal medya post editörü
  </text>

  <!-- Big CTA -->
  <g transform="translate(540, 600)">
    <rect x="-260" y="-44" width="520" height="88" rx="18" fill="url(#cta2)" filter="url(#glow2)"/>
    <text x="0" y="14" text-anchor="middle" class="h2" font-size="38" fill="#ffffff">✨ AI'ya bırak</text>
  </g>

  <!-- 6 features stacked -->
  <g transform="translate(80, 760)">
    <g transform="translate(0, 0)">
      <rect width="920" height="130" rx="16" fill="#ffffff" opacity="0.08"/>
      <text x="40" y="80" class="h1" font-size="60">🎁</text>
      <text x="130" y="62" class="h2" font-size="32" fill="#ffffff">Tam Paket AI</text>
      <text x="130" y="100" class="body" font-size="20" fill="#ffffff" opacity="0.7">yazı + stil + renk tek tıkla uygulanır</text>
    </g>
    <g transform="translate(0, 158)">
      <rect width="920" height="130" rx="16" fill="#ffffff" opacity="0.08"/>
      <text x="40" y="80" class="h1" font-size="60">🎨</text>
      <text x="130" y="62" class="h2" font-size="32" fill="#ffffff">26 Filtre · 63 Font · 12 Stil</text>
      <text x="130" y="100" class="body" font-size="20" fill="#ffffff" opacity="0.7">Sinematik, HDR, Lomo, Neon, Geylani Stili...</text>
    </g>
    <g transform="translate(0, 316)">
      <rect width="920" height="130" rx="16" fill="#ffffff" opacity="0.08"/>
      <text x="40" y="80" class="h1" font-size="60">🔲</text>
      <text x="130" y="62" class="h2" font-size="32" fill="#ffffff">Vurgulu yazı, paragraf, gölge, glow</text>
      <text x="130" y="100" class="body" font-size="20" fill="#ffffff" opacity="0.7">[[önemli]] syntax ile tek kelime highlight</text>
    </g>
    <g transform="translate(0, 474)">
      <rect width="920" height="130" rx="16" fill="#ffffff" opacity="0.08"/>
      <text x="40" y="80" class="h1" font-size="60">😀</text>
      <text x="130" y="62" class="h2" font-size="32" fill="#ffffff">Çoklu katman · Emoji · Filter</text>
      <text x="130" y="100" class="body" font-size="20" fill="#ffffff" opacity="0.7">Sürükle-bırak, sırala, sil, kompoze et</text>
    </g>
    <g transform="translate(0, 632)">
      <rect width="920" height="130" rx="16" fill="#ffffff" opacity="0.08"/>
      <text x="40" y="80" class="h1" font-size="60">📱</text>
      <text x="130" y="62" class="h2" font-size="32" fill="#ffffff">PWA · Mobile · Custom domain</text>
      <text x="130" y="100" class="body" font-size="20" fill="#ffffff" opacity="0.7">Ana ekrana ekle, telefonda da çalışır</text>
    </g>
    <g transform="translate(0, 790)">
      <rect width="920" height="130" rx="16" fill="#ffffff" opacity="0.08"/>
      <text x="40" y="80" class="h1" font-size="60">🛡</text>
      <text x="130" y="62" class="h2" font-size="32" fill="#ffffff">Ücretsiz · Lokal · Açık kaynak</text>
      <text x="130" y="100" class="body" font-size="20" fill="#ffffff" opacity="0.7">Görseliniz cihazınızdan çıkmaz</text>
    </g>
  </g>

  <!-- Footer URL -->
  <rect x="180" y="1740" width="720" height="80" rx="40" fill="#ffffff" opacity="0.08"/>
  <text x="540" y="1790" text-anchor="middle" class="mono" font-size="28" fill="#ffffff">
    app.postmanager.muhyi.academy
  </text>
</svg>
