<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1115"/>
      <stop offset="50%" stop-color="#3b0764"/>
      <stop offset="100%" stop-color="#831843"/>
    </linearGradient>
    <linearGradient id="cta" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="50%" stop-color="#d946ef"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .h1 { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 900; }
      .h2 { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 700; }
      .body { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 500; }
      .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; font-weight: 600; }
    </style>
  </defs>

  <!-- BG -->
  <rect width="1080" height="1080" fill="url(#bg)"/>

  <!-- Decorative dots -->
  <circle cx="120" cy="180" r="4" fill="#f59e0b" opacity="0.6"/>
  <circle cx="960" cy="240" r="6" fill="#06b6d4" opacity="0.5"/>
  <circle cx="200" cy="900" r="5" fill="#ec4899" opacity="0.6"/>
  <circle cx="900" cy="860" r="4" fill="#10b981" opacity="0.5"/>
  <circle cx="540" cy="80"  r="3" fill="#ffffff" opacity="0.4"/>

  <!-- Top: Logo + tagline -->
  <g transform="translate(540, 130)">
    <rect x="-44" y="-44" width="88" height="88" rx="22" fill="url(#cta)" opacity="0.95"/>
    <text x="0" y="18" text-anchor="middle" class="h1" font-size="62" fill="#ffffff">◆</text>
  </g>
  <text x="540" y="280" text-anchor="middle" class="h1" font-size="92" fill="#ffffff">PostManager</text>
  <text x="540" y="330" text-anchor="middle" class="body" font-size="28" fill="#ffffff" opacity="0.75">
    AI'lı sosyal medya post editörü
  </text>

  <!-- Big CTA: AI'ya bırak -->
  <g transform="translate(540, 410)">
    <rect x="-200" y="-32" width="400" height="64" rx="14" fill="url(#cta)" filter="url(#glow)"/>
    <text x="0" y="10" text-anchor="middle" class="h2" font-size="28" fill="#ffffff">✨ AI'ya bırak</text>
  </g>

  <!-- 6 feature cards in a 3x2 grid -->
  <g transform="translate(80, 510)">
    <!-- Row 1 -->
    <g transform="translate(0, 0)">
      <rect width="280" height="120" rx="14" fill="#ffffff" opacity="0.08"/>
      <text x="20" y="46" class="h1" font-size="40">🎁</text>
      <text x="78" y="44" class="h2" font-size="22" fill="#ffffff">Tam Paket AI</text>
      <text x="78" y="76" class="body" font-size="15" fill="#ffffff" opacity="0.7">yazı + stil + renk</text>
      <text x="78" y="98" class="body" font-size="15" fill="#ffffff" opacity="0.7">tek tıkla uygulanır</text>
    </g>
    <g transform="translate(320, 0)">
      <rect width="280" height="120" rx="14" fill="#ffffff" opacity="0.08"/>
      <text x="20" y="46" class="h1" font-size="40">🎨</text>
      <text x="78" y="44" class="h2" font-size="22" fill="#ffffff">26 Filtre</text>
      <text x="78" y="76" class="body" font-size="15" fill="#ffffff" opacity="0.7">Sinematik · HDR · Lomo</text>
      <text x="78" y="98" class="body" font-size="15" fill="#ffffff" opacity="0.7">Cyberpunk · Polaroid...</text>
    </g>
    <g transform="translate(640, 0)">
      <rect width="280" height="120" rx="14" fill="#ffffff" opacity="0.08"/>
      <text x="20" y="46" class="h1" font-size="40">🔤</text>
      <text x="78" y="44" class="h2" font-size="22" fill="#ffffff">63 Font</text>
      <text x="78" y="76" class="body" font-size="15" fill="#ffffff" opacity="0.7">9 mood: Modern · Hat</text>
      <text x="78" y="98" class="body" font-size="15" fill="#ffffff" opacity="0.7">Tech · Retro · Dekoratif</text>
    </g>

    <!-- Row 2 -->
    <g transform="translate(0, 144)">
      <rect width="280" height="120" rx="14" fill="#ffffff" opacity="0.08"/>
      <text x="20" y="46" class="h1" font-size="40">✨</text>
      <text x="78" y="44" class="h2" font-size="22" fill="#ffffff">12 Stil Preset</text>
      <text x="78" y="76" class="body" font-size="15" fill="#ffffff" opacity="0.7">Neon · Vintage Poster</text>
      <text x="78" y="98" class="body" font-size="15" fill="#ffffff" opacity="0.7">Sticker · Geylani Stili</text>
    </g>
    <g transform="translate(320, 144)">
      <rect width="280" height="120" rx="14" fill="#ffffff" opacity="0.08"/>
      <text x="20" y="46" class="h1" font-size="40">🔲</text>
      <text x="78" y="44" class="h2" font-size="22" fill="#ffffff">Vurgulu Yazı</text>
      <text x="78" y="76" class="body" font-size="15" fill="#ffffff" opacity="0.7">[[önemli]] syntax ile</text>
      <text x="78" y="98" class="body" font-size="15" fill="#ffffff" opacity="0.7">tek kelime highlight</text>
    </g>
    <g transform="translate(640, 144)">
      <rect width="280" height="120" rx="14" fill="#ffffff" opacity="0.08"/>
      <text x="20" y="46" class="h1" font-size="40">🪞</text>
      <text x="78" y="44" class="h2" font-size="22" fill="#ffffff">Gölge · Glow</text>
      <text x="78" y="76" class="body" font-size="15" fill="#ffffff" opacity="0.7">Stroke · Arka plan</text>
      <text x="78" y="98" class="body" font-size="15" fill="#ffffff" opacity="0.7">Paragraf · Emoji</text>
    </g>

    <!-- Row 3 -->
    <g transform="translate(0, 288)">
      <rect width="280" height="120" rx="14" fill="#ffffff" opacity="0.08"/>
      <text x="20" y="46" class="h1" font-size="40">📱</text>
      <text x="78" y="44" class="h2" font-size="22" fill="#ffffff">Mobile Ready</text>
      <text x="78" y="76" class="body" font-size="15" fill="#ffffff" opacity="0.7">PWA — ana ekrana ekle</text>
      <text x="78" y="98" class="body" font-size="15" fill="#ffffff" opacity="0.7">Telefonda da çalışır</text>
    </g>
    <g transform="translate(320, 288)">
      <rect width="280" height="120" rx="14" fill="#ffffff" opacity="0.08"/>
      <text x="20" y="46" class="h1" font-size="40">🛡</text>
      <text x="78" y="44" class="h2" font-size="22" fill="#ffffff">Lokal-only</text>
      <text x="78" y="76" class="body" font-size="15" fill="#ffffff" opacity="0.7">Görseliniz cihazınızdan</text>
      <text x="78" y="98" class="body" font-size="15" fill="#ffffff" opacity="0.7">çıkmaz — gizli kalır</text>
    </g>
    <g transform="translate(640, 288)">
      <rect width="280" height="120" rx="14" fill="#ffffff" opacity="0.08"/>
      <text x="20" y="46" class="h1" font-size="40">🆓</text>
      <text x="78" y="44" class="h2" font-size="22" fill="#ffffff">Ücretsiz</text>
      <text x="78" y="76" class="body" font-size="15" fill="#ffffff" opacity="0.7">Açık kaynak, abonelik yok</text>
      <text x="78" y="98" class="body" font-size="15" fill="#ffffff" opacity="0.7">Reklam yok</text>
    </g>
  </g>

  <!-- Footer URL -->
  <rect x="270" y="970" width="540" height="64" rx="32" fill="#ffffff" opacity="0.08"/>
  <text x="540" y="1011" text-anchor="middle" class="mono" font-size="22" fill="#ffffff">
    app.postmanager.muhyi.academy
  </text>
</svg>
